<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HAVEN Agent Onboarding</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --text: #172026;
      --muted: #5d6973;
      --line: #d7dde3;
      --ok: #157f3b;
      --warn: #9a5a00;
      --blocked: #767d84;
      --bad: #b42318;
      --accent: #176b87;
      --code: #101820;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      padding: 18px 24px 14px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 24px 36px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 6px;
      font-size: 14px;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      margin-top: 4px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0;
    }

    button {
      appearance: none;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
      border-radius: 6px;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }

    button.secondary {
      background: #ffffff;
      color: var(--accent);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status-line {
      color: var(--muted);
      min-height: 20px;
      overflow-wrap: anywhere;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }

    .card.step {
      border-top: 4px solid var(--blocked);
      min-height: 132px;
    }

    .card.step.complete {
      border-top-color: var(--ok);
    }

    .card.step.active {
      border-top-color: var(--warn);
    }

    .card.step.blocked {
      border-top-color: var(--blocked);
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      background: #eceff2;
      color: var(--blocked);
    }

    .badge.complete {
      color: var(--ok);
      background: #e4f5eb;
    }

    .badge.active {
      color: var(--warn);
      background: #fff3d8;
    }

    .badge.error {
      color: var(--bad);
      background: #fde7e3;
    }

    dl {
      display: grid;
      grid-template-columns: minmax(110px, 34%) minmax(0, 1fr);
      gap: 8px 12px;
      margin: 0;
    }

    dt {
      color: var(--muted);
    }

    dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .command {
      margin-top: 10px;
      color: var(--code);
      background: #eef2f5;
      border: 1px solid #dde5ec;
      border-radius: 6px;
      padding: 8px;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    textarea {
      width: 100%;
      min-height: 210px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      color: var(--code);
      background: #fbfcfd;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.35;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .route {
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .route:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .error {
      color: var(--bad);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 820px) {
      header {
        padding: 16px;
      }

      main {
        padding: 16px;
      }

      .steps,
      .grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      dl {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>HAVEN Agent Onboarding</h1>
    <div class="meta" id="headline">Waiting for local agent status.</div>
  </header>

  <main>
    <div class="toolbar">
      <div class="status-line" id="statusLine">Loading.</div>
      <div>
        <button id="refreshButton" type="button">Refresh</button>
      </div>
    </div>

    <section class="steps" id="steps"></section>

    <section class="grid">
      <article class="card">
        <h2>Agent supervisor</h2>
        <dl id="supervisor"></dl>
      </article>

      <article class="card">
        <h2>Agent identity</h2>
        <dl id="identity"></dl>
      </article>

      <article class="card">
        <h2>Intent review</h2>
        <dl id="intentReview"></dl>
      </article>

      <article class="card">
        <h2>Network sentinel</h2>
        <dl id="networkSentinel"></dl>
      </article>

      <article class="card">
        <h2>Provisioning request</h2>
        <div class="toolbar">
          <div class="status-line" id="provisioningStatus"></div>
          <button class="secondary" id="copyProvisioning" type="button">Copy</button>
        </div>
        <textarea id="provisioningPayload" readonly spellcheck="false"></textarea>
      </article>

      <article class="card">
        <h2>Registered local routes</h2>
        <div class="list" id="routes"></div>
      </article>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    const statusLine = document.getElementById("statusLine");
    const refreshButton = document.getElementById("refreshButton");
    const provisioningPayload = document.getElementById("provisioningPayload");
    const copyProvisioning = document.getElementById("copyProvisioning");

    function statusURL() {
      const url = new URL("/onboard/status.json", window.location.origin);
      if (token) {
        url.searchParams.set("token", token);
      }
      url.searchParams.set("t", Date.now().toString());
      return url;
    }

    function text(value, fallback = "n/a") {
      if (value === null || value === undefined || value === "") return fallback;
      return String(value);
    }

    function path(object, keys, fallback = undefined) {
      let current = object;
      for (const key of keys) {
        if (current === null || current === undefined) return fallback;
        current = current[key];
      }
      return current === undefined ? fallback : current;
    }

    function cell(report, routeName) {
      return (path(report, ["cells", "routeStates"], []) || []).find((item) => item.routeName === routeName);
    }

    function value(report, routeName) {
      const item = cell(report, routeName);
      return item && item.value ? item.value : {};
    }

    function setDefinitionList(id, rows) {
      const dl = document.getElementById(id);
      dl.textContent = "";
      for (const [label, rawValue, className] of rows) {
        const dt = document.createElement("dt");
        dt.textContent = label;
        const dd = document.createElement("dd");
        dd.textContent = text(rawValue);
        if (className) dd.className = className;
        dl.append(dt, dd);
      }
    }

    function renderSteps(report) {
      const container = document.getElementById("steps");
      container.textContent = "";
      for (const step of report.steps || []) {
        const article = document.createElement("article");
        article.className = `card step ${step.state}`;

        const badge = document.createElement("span");
        badge.className = `badge ${step.state}`;
        badge.textContent = step.state;

        const title = document.createElement("h3");
        title.textContent = step.title;

        const summary = document.createElement("p");
        summary.textContent = step.summary || "";

        article.append(badge, title, summary);
        if (step.command) {
          const command = document.createElement("div");
          command.className = "command";
          command.textContent = step.command;
          article.append(command);
        }
        container.append(article);
      }
    }

    function renderProvisioning(report) {
      const snapshot = report.provisioningRequest || {};
      const status = document.getElementById("provisioningStatus");
      if (snapshot.available && snapshot.payload) {
        provisioningPayload.value = JSON.stringify(snapshot.payload, null, 2);
        status.textContent = "Payload is ready to copy.";
        copyProvisioning.disabled = false;
      } else {
        provisioningPayload.value = "";
        status.textContent = snapshot.error || "Provisioning request is not available.";
        copyProvisioning.disabled = true;
      }
    }

    function renderRoutes(report) {
      const container = document.getElementById("routes");
      container.textContent = "";
      const routes = path(report, ["cells", "routeStates"], []) || [];
      for (const route of routes) {
        const item = document.createElement("div");
        item.className = "route";

        const title = document.createElement("h3");
        title.textContent = route.routeName;

        const target = document.createElement("div");
        target.className = "muted";
        target.textContent = route.targetCellReference;

        const description = document.createElement("div");
        description.textContent = route.description || "";

        item.append(title, target, description);
        if (route.error) {
          const error = document.createElement("div");
          error.className = "error";
          error.textContent = route.error;
          item.append(error);
        }
        container.append(item);
      }
    }

    function render(report) {
      document.getElementById("headline").textContent =
        `Runtime root: ${text(path(report, ["status", "runtimeRoot"]))}`;
      statusLine.textContent = `Updated ${text(report.recordedAt)}. Next step: ${text(path(report, ["status", "nextStep", "summary"]))}`;

      const supervisor = value(report, "agent-supervisor");
      setDefinitionList("supervisor", [
        ["Runtime", path(supervisor, ["status"])],
        ["Control bridge", path(supervisor, ["controlBridge", "phase"], path(report, ["status", "controlBridge", "listening"]) ? "running" : "not listening")],
        ["Porthole", path(supervisor, ["porthole", "phase"], "not connected")],
        ["Last error", path(supervisor, ["lastError"], "none")]
      ]);

      const identityCell = value(report, "agent-identity");
      setDefinitionList("identity", [
        ["Status", path(identityCell, ["status"], path(report, ["status", "identity", "present"]) ? "ready" : "missing")],
        ["DID", path(identityCell, ["identity", "didKey"], path(report, ["status", "identity", "didKey"]))],
        ["Public key", path(identityCell, ["identity", "publicKeyBase64URL"], path(report, ["status", "identity", "publicKeyShort"]))],
        ["Domain", path(report, ["status", "config", "scaffoldDomain"])]
      ]);

      const review = value(report, "intent-review");
      setDefinitionList("intentReview", [
        ["Pending", path(review, ["pendingCount"], 0)],
        ["Audit records", path(review, ["auditCount"], 0)],
        ["Last outcome", path(review, ["lastOutcome"], "none")],
        ["Last intent", path(review, ["lastIntentID"], "none")]
      ]);

      const sentinel = value(report, "network-sentinel");
      setDefinitionList("networkSentinel", [
        ["Status", path(sentinel, ["statusText"], path(sentinel, ["status"]))],
        ["Interface", path(sentinel, ["interface"])],
        ["Active event", path(sentinel, ["activeEventText"])],
        ["Updated", path(sentinel, ["updatedAt"])]
      ]);

      renderSteps(report);
      renderProvisioning(report);
      renderRoutes(report);
    }

    async function refresh() {
      refreshButton.disabled = true;
      statusLine.textContent = "Refreshing.";
      try {
        const response = await fetch(statusURL(), { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        render(await response.json());
      } catch (error) {
        statusLine.textContent = `Unable to load local onboarding status: ${error.message}`;
      } finally {
        refreshButton.disabled = false;
      }
    }

    refreshButton.addEventListener("click", refresh);
    copyProvisioning.addEventListener("click", async () => {
      if (!provisioningPayload.value) return;
      await navigator.clipboard.writeText(provisioningPayload.value);
      document.getElementById("provisioningStatus").textContent = "Copied.";
    });

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
